<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinéJS - Gestionnaire de Films</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>CinéJS</h1>
    <p>Mon gestionnaire de films en JavaScript</p>
  </header>

  <main>
    <!-- Barre de recherche -->
    <section class="controls">
      <input type="text" id="recherche" placeholder="Rechercher un film ou un réalisateur...">
    </section>

    <!-- Grille de films -->
    <section id="films-container" class="films-grid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
